databases:
  - name: iot-energy-cloud-db
    databaseName: iess_db
    user: iess
    plan: free

services:
  - type: web
    name: iot-energy-cloud
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # 真實 MQTT 流程：後端內建發布執行緒 → broker.hivemq.com → 後端訂閱
      # （Render 免費版無獨立 worker，故發布器跑在後端的一條 daemon thread）
      - key: DEMO_MODE
        value: "false"
      - key: RUN_SIMULATOR
        value: "true"
      - key: MQTT_HOST
        value: broker.hivemq.com
      - key: MQTT_PORT
        value: "1883"
      - key: POSTGRES_URL
        fromDatabase:
          name: iot-energy-cloud-db
          property: connectionString
      - key: INFLUX_URL
        sync: false
      - key: INFLUX_TOKEN
        sync: false
      - key: INFLUX_ORG
        sync: false
      - key: INFLUX_BUCKET
        value: realtime
      - key: REDIS_URL
        sync: false
