name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'dashboard.html'
      - 'admin.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject backend URL into dashboard
        env:
          BACKEND_URL: ${{ vars.RENDER_BACKEND_URL }}
        run: |
          if [ -n "$BACKEND_URL" ]; then
            sed -i "s|http://localhost:8000|$BACKEND_URL|g" dashboard.html
            sed -i "s|http://localhost:8000|$BACKEND_URL|g" admin.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
