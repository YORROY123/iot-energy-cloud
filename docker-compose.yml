services:
  emqx:
    image: emqx:5
    ports:
      - "1883:1883"
      - "18083:18083"
    environment:
      EMQX_DASHBOARD__DEFAULT_PASSWORD: admin123
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: iess
      DOCKER_INFLUXDB_INIT_BUCKET: realtime
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iess
      POSTGRES_PASSWORD: iess123
      POSTGRES_DB: iess_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started
      redis:
        condition: service_started
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: my-super-secret-token
      INFLUX_ORG: iess
      INFLUX_BUCKET: realtime
      POSTGRES_URL: postgresql://iess:iess123@postgres/iess_db
      REDIS_URL: redis://redis:6379
    restart: on-failure

  simulator:
    build: ./simulator
    depends_on:
      emqx:
        condition: service_healthy
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
    restart: on-failure

volumes:
  influxdb_data:
  postgres_data:
