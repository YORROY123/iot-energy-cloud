<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>IoT Energy Cloud — 即時監控看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }

  header {
    background: #1a1d27;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #2a2d3a;
  }
  header h1 { font-size: 20px; color: #fff; }
  #status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; margin-left: auto;
  }
  #status-dot.connected { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
  #status-text { font-size: 13px; color: #888; }

  .sites { display: flex; gap: 16px; padding: 20px; flex-wrap: wrap; }

  .site-card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 16px;
    min-width: 320px;
    flex: 1;
  }
  .site-card h2 { font-size: 14px; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .site-card h3 { font-size: 16px; color: #fff; margin-bottom: 12px; }

  .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .device {
    background: #0f1117;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    padding: 12px;
    transition: border-color 0.3s;
  }
  .device.anomaly { border-color: #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } }

  .device-name { font-size: 11px; color: #666; margin-bottom: 4px; }
  .device-value { font-size: 26px; font-weight: bold; }
  .device-unit { font-size: 12px; color: #888; margin-left: 4px; }
  .device-time { font-size: 10px; color: #555; margin-top: 4px; }

  .temp   .device-value { color: #38bdf8; }
  .power  .device-value { color: #f59e0b; }
  .humid  .device-value { color: #34d399; }
  .co2    .device-value { color: #a78bfa; }
  .anomaly .device-value { color: #ef4444 !important; }

  .chart-section { padding: 0 20px 20px; }
  .chart-box {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 16px;
  }
  .chart-box h3 { font-size: 14px; color: #888; margin-bottom: 12px; }
  canvas { max-height: 200px; }

  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 12px;
  }
  .history-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #histDevice {
    background: #0f1117; color: #e0e0e0; border: 1px solid #2a2d3a;
    border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer;
  }
  .range-buttons { display: flex; gap: 4px; }
  .range-buttons button {
    background: #0f1117; color: #888; border: 1px solid #2a2d3a;
    border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    transition: all 0.15s;
  }
  .range-buttons button:hover { color: #e0e0e0; border-color: #3b82f6; }
  .range-buttons button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  #histStatus { font-size: 12px; color: #666; }

  .log-section { padding: 0 20px 20px; }
  .log-box {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 16px;
    height: 150px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
  }
  .log-box p { color: #555; margin-bottom: 4px; }
  .log-box p.alert { color: #ef4444; }
  .log-box p.normal { color: #22c55e; }
</style>
</head>
<body>

<header>
  <div style="width:32px;height:32px;background:#2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;">i</div>
  <h1>IoT Energy Cloud</h1>
  <span id="status-text">連線中...</span>
  <div id="status-dot"></div>
</header>

<div class="sites" id="sites-container"></div>

<div class="chart-section">
  <div class="chart-box">
    <h3>即時電力趨勢（最近 60 筆）</h3>
    <canvas id="powerChart"></canvas>
  </div>
</div>

<div class="chart-section">
  <div class="chart-box">
    <div class="history-header">
      <h3>歷史查詢（從資料庫撈）</h3>
      <div class="history-controls">
        <select id="histDevice"></select>
        <div class="range-buttons" id="rangeButtons"></div>
        <span id="histStatus"></span>
      </div>
    </div>
    <canvas id="historyChart"></canvas>
  </div>
</div>

<div class="log-section">
  <div class="log-box" id="log"></div>
</div>

<script>
const UNITS = { temperature: '°C', power: 'W', humidity: '%', co2: 'ppm' };
const THRESHOLDS = { temperature: { alert: -10 }, power: { alert: 2500 } };

// Device state store: { device_uid: { value, ts, device_type, site_id, customer_id } }
const state = {};

// Sites layout
const SITES = {
  'C001/S001': { label: '客戶C001 — 門市S001', customer: 'C001', site: 'S001' },
  'C001/S002': { label: '客戶C001 — 門市S002', customer: 'C001', site: 'S002' },
  'C002/S003': { label: '客戶C002 — 門市S003', customer: 'C002', site: 'S003' },
  'C002/S004': { label: '客戶C002 — 門市S004', customer: 'C002', site: 'S004' },
};

// Build site cards
const sitesContainer = document.getElementById('sites-container');
Object.entries(SITES).forEach(([key, info]) => {
  const card = document.createElement('div');
  card.className = 'site-card';
  card.innerHTML = `<h2>${info.customer}</h2><h3>${info.label}</h3><div class="device-grid" id="grid-${info.customer}-${info.site}"></div>`;
  sitesContainer.appendChild(card);
});

function getGrid(customer, site) {
  return document.getElementById(`grid-${customer}-${site}`);
}

function getDeviceEl(uid) {
  return document.getElementById(`dev-${uid}`);
}

function createDeviceEl(uid, dtype) {
  const div = document.createElement('div');
  div.className = `device ${dtype.replace('co2','co2')}`;
  div.id = `dev-${uid}`;
  div.innerHTML = `
    <div class="device-name">${uid}</div>
    <div><span class="device-value" id="val-${uid}">—</span><span class="device-unit">${UNITS[dtype]||''}</span></div>
    <div class="device-time" id="time-${uid}">等待資料...</div>
  `;
  return div;
}

function isAnomaly(dtype, value) {
  if (dtype === 'temperature' && value > -10) return true;
  if (dtype === 'power' && value > 2500) return true;
  return false;
}

function updateDevice(msg) {
  const { customer_id, site_id, device_type, device_uid, value, ts } = msg;
  const key = `${customer_id}/${site_id}`;

  const grid = getGrid(customer_id, site_id);
  if (!grid) return;

  let el = getDeviceEl(device_uid);
  if (!el) {
    el = createDeviceEl(device_uid, device_type);
    el.classList.add(device_type === 'co2' ? 'co2' : device_type);
    grid.appendChild(el);
  }

  const anomaly = isAnomaly(device_type, value);
  el.classList.toggle('anomaly', anomaly);
  document.getElementById(`val-${device_uid}`).textContent = value.toFixed(1);
  document.getElementById(`time-${device_uid}`).textContent = new Date(ts * 1000).toLocaleTimeString('zh-TW');
}

// Chart
const powerHistory = { labels: [], data: {} };
const POWER_DEVICES = ['meter01', 'meter02', 'meter03', 'meter04'];
const colors = ['#f59e0b', '#38bdf8', '#34d399', '#a78bfa'];

const ctx = document.getElementById('powerChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: POWER_DEVICES.map((uid, i) => ({
      label: uid,
      data: [],
      borderColor: colors[i],
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
    }))
  },
  options: {
    animation: false,
    scales: {
      x: {
        display: true,
        ticks: {
          color: '#888',
          maxRotation: 0,
          autoSkip: true,
          maxTicksLimit: 8,   // 最多顯示 8 個時間刻度，避免擁擠
        },
        grid: { color: '#1f2230' }
      },
      y: { ticks: { color: '#888' }, grid: { color: '#2a2d3a' } }
    },
    plugins: {
      legend: { labels: { color: '#888', boxWidth: 12 } },
      tooltip: { enabled: true }   // 滑鼠移上去顯示該時間點數值
    }
  }
});

function updateChart(uid, value, ts) {
  if (!POWER_DEVICES.includes(uid)) return;
  const label = new Date(ts * 1000).toLocaleTimeString('zh-TW');
  const idx = POWER_DEVICES.indexOf(uid);

  if (idx === 0) {
    chart.data.labels.push(label);
    if (chart.data.labels.length > 60) chart.data.labels.shift();
  }
  chart.data.datasets[idx].data.push(value);
  if (chart.data.datasets[idx].data.length > 60) chart.data.datasets[idx].data.shift();
  chart.update('none');
}

// Log
const logEl = document.getElementById('log');
function addLog(msg, cls = 'normal') {
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = `[${new Date().toLocaleTimeString('zh-TW')}] ${msg}`;
  logEl.insertBefore(p, logEl.firstChild);
  if (logEl.children.length > 100) logEl.removeChild(logEl.lastChild);
}

// WebSocket — URL 可透過 ?backend=https://your-service.onrender.com 覆寫
const _params = new URLSearchParams(window.location.search);
const _backendBase = (_params.get('backend') || 'http://localhost:8000').replace(/\/$/, '');
const _wsURL = _backendBase.replace(/^http/, 'ws') + '/ws/dashboard';

// 斷線偵測：資料正常每 3 秒一筆，若超過 STALE_MS 沒收到任何訊息，
// 視為半開連線（Render 代理層常見），主動關閉並重連。
const STALE_MS = 10000;
let _lastMsgTime = 0;
let _watchdog = null;
let _currentWs = null;

function connect() {
  const ws = new WebSocket(_wsURL);
  _currentWs = ws;
  _lastMsgTime = Date.now();

  ws.onopen = () => {
    document.getElementById('status-dot').className = 'connected';
    document.getElementById('status-text').textContent = '已連線';
    addLog('WebSocket 連線成功', 'normal');
    _lastMsgTime = Date.now();

    // 啟動看門狗
    if (_watchdog) clearInterval(_watchdog);
    _watchdog = setInterval(() => {
      if (Date.now() - _lastMsgTime > STALE_MS) {
        addLog('連線無回應，重新連線中…', 'alert');
        document.getElementById('status-dot').className = '';
        document.getElementById('status-text').textContent = '連線逾時，重連中...';
        try { ws.close(); } catch (_) {}
      }
    }, 3000);
  };

  ws.onmessage = (e) => {
    _lastMsgTime = Date.now();
    const msg = JSON.parse(e.data);
    if (msg.type === 'ping') return;       // 心跳，僅用於更新存活時間
    if (msg.type !== 'sensor_update') return;

    updateDevice(msg);
    if (msg.device_type === 'power') updateChart(msg.device_uid, msg.value, msg.ts);

    if (isAnomaly(msg.device_type, msg.value)) {
      addLog(`⚠ 異常！${msg.device_uid} = ${msg.value} ${UNITS[msg.device_type]||''}`, 'alert');
    }
  };

  ws.onclose = () => {
    if (_watchdog) { clearInterval(_watchdog); _watchdog = null; }
    document.getElementById('status-dot').className = '';
    document.getElementById('status-text').textContent = '重新連線中...';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => { try { ws.close(); } catch (_) {} };
}

connect();

// ===================== 歷史查詢（從資料庫撈） =====================
const HIST_DEVICES = [
  { uid: 'fridge01', label: 'C001/S001 冷藏 fridge01 (溫度)' },
  { uid: 'fridge02', label: 'C001/S001 冷藏 fridge02 (溫度)' },
  { uid: 'meter01',  label: 'C001/S001 電表 meter01 (電力)' },
  { uid: 'humid01',  label: 'C001/S002 濕度 humid01 (濕度)' },
  { uid: 'co2_01',   label: 'C001/S002 co2_01 (CO₂)' },
  { uid: 'meter02',  label: 'C001/S002 電表 meter02 (電力)' },
  { uid: 'fridge03', label: 'C002/S003 冷藏 fridge03 (溫度)' },
  { uid: 'fridge04', label: 'C002/S003 冷藏 fridge04 (溫度)' },
  { uid: 'meter03',  label: 'C002/S003 電表 meter03 (電力)' },
  { uid: 'fridge05', label: 'C002/S004 冷藏 fridge05 (溫度)' },
  { uid: 'meter04',  label: 'C002/S004 電表 meter04 (電力)' },
  { uid: 'humid02',  label: 'C002/S004 濕度 humid02 (濕度)' },
];
const RANGES = [
  { key: '15m', label: '15分鐘' },
  { key: '1h',  label: '1小時' },
  { key: '6h',  label: '6小時' },
  { key: '24h', label: '24小時' },
  { key: '7d',  label: '7天' },
  { key: '30d', label: '30天' },
];

let _histRange = '1h';

// 填入裝置下拉選單
const histDeviceSel = document.getElementById('histDevice');
HIST_DEVICES.forEach(d => {
  const opt = document.createElement('option');
  opt.value = d.uid; opt.textContent = d.label;
  histDeviceSel.appendChild(opt);
});

// 建立範圍按鈕
const rangeBtnBox = document.getElementById('rangeButtons');
RANGES.forEach(r => {
  const btn = document.createElement('button');
  btn.textContent = r.label;
  btn.dataset.range = r.key;
  if (r.key === _histRange) btn.classList.add('active');
  btn.onclick = () => {
    _histRange = r.key;
    document.querySelectorAll('#rangeButtons button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadHistory();
  };
  rangeBtnBox.appendChild(btn);
});

histDeviceSel.onchange = loadHistory;

// 歷史圖表
const histCtx = document.getElementById('historyChart').getContext('2d');
const historyChart = new Chart(histCtx, {
  type: 'line',
  data: { labels: [], datasets: [{
    label: '', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)',
    borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true,
  }]},
  options: {
    animation: false,
    scales: {
      x: { ticks: { color: '#888', maxRotation: 0, autoSkip: true, maxTicksLimit: 10 }, grid: { color: '#1f2230' } },
      y: { ticks: { color: '#888' }, grid: { color: '#2a2d3a' } }
    },
    plugins: { legend: { display: false }, tooltip: { enabled: true } }
  }
});

async function loadHistory() {
  const uid = histDeviceSel.value;
  const status = document.getElementById('histStatus');
  status.textContent = '查詢中…';
  try {
    const res = await fetch(`${_backendBase}/api/history?device_uid=${uid}&range=${_histRange}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const points = await res.json();

    historyChart.data.labels = points.map(p => {
      const d = new Date(p.ts);
      // 短範圍顯示時:分:秒，長範圍顯示月/日 時:分
      return (_histRange === '15m' || _histRange === '1h')
        ? d.toLocaleTimeString('zh-TW')
        : `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    });
    historyChart.data.datasets[0].data = points.map(p => p.value);
    historyChart.data.datasets[0].label = uid;
    historyChart.update('none');

    status.textContent = points.length ? `共 ${points.length} 筆` : '此範圍無資料';
  } catch (err) {
    status.textContent = `查詢失敗：${err.message}`;
  }
}

// 首次載入先撈一次
loadHistory();
</script>
</body>
</html>
